name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags "-X github.com/mathworks/matlab-proxy-go/internal/version.Version=${VERSION}" \
            -o "matlab-proxy${EXT}" ./cmd/matlab-proxy

      - name: Package (tar.gz)
        if: matrix.goos != 'windows'
        run: |
          ARCHIVE="matlab-proxy-${GITHUB_REF_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          tar czf "${ARCHIVE}" matlab-proxy
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: matrix.goos == 'windows'
        run: |
          ARCHIVE="matlab-proxy-${GITHUB_REF_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}.zip"
          zip "${ARCHIVE}" matlab-proxy.exe
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
          prerelease: ${{ contains(github.ref_name, '-') }}
