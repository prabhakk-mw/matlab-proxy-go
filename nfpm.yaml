# Copyright 2026 The MathWorks, Inc.

name: matlab-proxy
arch: "${GOARCH}"
platform: linux
version: "${VERSION}"
maintainer: "The MathWorks, Inc. <cloud@mathworks.com>"
description: "Browser-based access to MATLAB — a web server that launches MATLAB and provides access to it from a browser."
vendor: "The MathWorks, Inc."
homepage: "https://github.com/mathworks/matlab-proxy-go"
license: "MATHWORKS CLOUD REFERENCE ARCHITECTURE LICENSE"

# Recommended dependencies (installed by default with apt, skippable with --no-install-recommends).
# Uses Debian package names; RPM equivalents are xorg-x11-server-Xvfb and fluxbox.
recommends:
  - xvfb
  - fluxbox

contents:
  - src: matlab-proxy
    dst: /usr/local/bin/matlab-proxy
    file_info:
      mode: 0755
